<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Vistor — Patrulha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0a;
    --surface:   #141414;
    --surface2:  #1c1c1c;
    --border:    #262626;
    --green:     #4ade80;
    --green-dim: #1c4d2c;
    --amber:     #d9a23b;
    --red:       #e25555;
    --text:      #f2f2f2;
    --text2:     #8a8a8a;
    --text3:     #4a4a4a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height:100%; width:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow:hidden;
    font-variant-numeric: tabular-nums;
  }

  /* ─── SCREENS ─── */
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; transition:opacity .3s, transform .3s; }
  .screen.hidden { opacity:0; pointer-events:none; transform:scale(0.97); }

  /* ══════════════════════════════
     TELA 1 — INÍCIO
  ══════════════════════════════ */
  #screen-start {
    background:var(--bg);
    align-items:center; justify-content:center;
    padding:40px 28px;
  }

  .start-wrap {
    width:100%; max-width:380px;
    display:flex; flex-direction:column; align-items:center;
  }

  .start-logo {
    margin-bottom:40px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .start-logo svg { width:56px; height:56px; }
  .start-logo-name {
    font-size:26px; font-weight:800; letter-spacing:-0.5px; text-align:center;
    color:var(--text);
  }
  .start-logo-sub {
    font-size:11px; letter-spacing:.16em; font-weight:500;
    color:var(--text3); text-transform:uppercase; margin-top:-6px;
  }

  .status-line {
    font-size:12px; color:var(--text3); text-align:center;
    margin-bottom:32px; line-height:1.6; font-weight:500;
    min-height:16px;
  }

  .btn-start {
    width:100%; padding:18px; border-radius:14px; border:none; cursor:pointer;
    background:var(--green); color:#0a0a0a;
    font-family:inherit; font-size:16px; font-weight:700;
    letter-spacing:.01em;
    transition: transform .15s, opacity .15s;
    margin-bottom:14px;
  }
  .btn-start:active { transform:scale(0.97); opacity:.9; }

  .btn-secondary {
    width:100%; padding:14px; border-radius:14px;
    border:1px solid var(--border); cursor:pointer;
    background:transparent; color:var(--text2);
    font-family:inherit; font-size:13px; font-weight:600;
  }

  .perm-warning {
    margin-top:28px; font-size:10px; color:var(--text3);
    text-align:center; line-height:1.7; font-weight:500;
  }

  /* ══════════════════════════════
     TELA 2 — PATRULHA ATIVA
  ══════════════════════════════ */
  #screen-patrol { background:#000; }

  .camera-view {
    position:relative; flex:1; overflow:hidden; background:#000;
  }
  #videoEl {
    width:100%; height:100%; object-fit:cover;
    filter:brightness(0.82) saturate(0.9);
  }

  .hud {
    position:absolute; inset:0; pointer-events:none;
  }
  .hud .action-row, .hud .action-row button {
    pointer-events:auto;
  }

  /* Corners — minimal, neutral grey */
  .corner {
    position:absolute; width:18px; height:18px;
    border-color:rgba(255,255,255,0.35); border-style:solid;
  }
  .corner.tl { top:18px; left:18px; border-width:1.5px 0 0 1.5px; }
  .corner.tr { top:18px; right:18px; border-width:1.5px 1.5px 0 0; }
  .corner.bl { bottom:18px; left:18px; border-width:0 0 1.5px 1.5px; }
  .corner.br { bottom:18px; right:18px; border-width:0 1.5px 1.5px 0; }

  .crosshair {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:22px; height:22px;
  }
  .crosshair::before, .crosshair::after {
    content:''; position:absolute; background:rgba(255,255,255,0.25);
  }
  .crosshair::before { top:50%; left:0; width:100%; height:1px; }
  .crosshair::after  { left:50%; top:0; height:100%; width:1px; }

  .hud-top {
    position:absolute; top:0; left:0; right:0;
    padding:14px 18px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    display:flex; align-items:center; justify-content:space-between;
  }
  .hud-rec {
    display:flex; align-items:center; gap:6px;
    font-size:11px; font-weight:600; color:var(--red);
    letter-spacing:.08em;
  }
  .hud-rec-dot {
    width:7px; height:7px; border-radius:50%; background:var(--red);
    animation:pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .hud-time {
    font-size:11px; font-weight:500; color:rgba(255,255,255,0.55);
  }

  .hud-gps {
    position:absolute; top:54px; right:18px;
    background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; padding:7px 10px;
    font-size:9.5px; font-weight:500;
    color:rgba(255,255,255,0.65); letter-spacing:.02em; line-height:1.7;
  }

  .hud-bottom {
    position:absolute; bottom:0; left:0; right:0;
    padding:18px;
    background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
  }

  .next-point-card {
    background:rgba(20,20,20,0.85); border:1px solid rgba(255,255,255,0.08);
    border-radius:14px; padding:14px 16px; margin-bottom:14px;
    backdrop-filter:blur(10px);
  }
  .np-label {
    font-size:9px; color:var(--text2); font-weight:600;
    letter-spacing:.12em; text-transform:uppercase; margin-bottom:7px;
  }
  .np-name { font-size:15px; font-weight:600; color:var(--text); margin-bottom:6px; }
  .np-info { display:flex; align-items:center; gap:14px; }
  .np-dist {
    font-size:21px; font-weight:700;
    color:var(--green);
  }
  .np-bar-wrap { flex:1; }
  .np-bar-track { height:3px; background:rgba(255,255,255,0.1); border-radius:2px; }
  .np-bar-fill  {
    height:3px; background:var(--green); border-radius:2px; width:30%;
    transition:width .5s ease;
  }
  .np-eta { font-size:10px; color:var(--text2); margin-top:4px; font-weight:500; }

  .action-row { display:flex; gap:10px; align-items:center; }
  .btn-stop {
    flex:1; padding:15px; border-radius:12px; border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.04); color:var(--text2);
    font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
  }
  .btn-manual {
    flex:1; padding:15px; border-radius:12px; border:none;
    background:var(--green); color:#0a0a0a;
    font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;
  }
  .btn-manual:active, .btn-stop:active { opacity:.7; transform:scale(0.97); }

  .capture-flash {
    position:fixed; inset:0; background:white;
    opacity:0; pointer-events:none; z-index:500;
    transition:opacity .05s;
  }
  .capture-flash.flash { opacity:0.8; }

  /* ══════════════════════════════
     TELA 3 — CAPTURA
  ══════════════════════════════ */
  #screen-capture { background:var(--bg); align-items:center; justify-content:center; padding:32px; }
  .capture-wrap { width:100%; max-width:340px; display:flex; flex-direction:column; align-items:center; }

  .capture-anim {
    width:110px; height:110px; border-radius:50%;
    border:2px solid var(--green); position:relative; margin-bottom:30px;
    animation:captureRing 1.5s ease infinite;
  }
  @keyframes captureRing {
    0%   { transform:scale(1);   opacity:.7; }
    50%  { transform:scale(1.05); opacity:1; }
    100% { transform:scale(1);   opacity:.7; }
  }
  .capture-icon { font-size:38px; position:absolute; inset:0; display:grid; place-items:center; filter:grayscale(1) brightness(1.6); }

  .capture-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:8px; }
  .capture-sub { font-size:13px; color:var(--text2); margin-bottom:30px; text-align:center; font-weight:500; }

  .photo-counter { display:flex; gap:8px; margin-bottom:30px; }
  .photo-dot {
    width:38px; height:38px; border-radius:10px;
    border:1px solid var(--border); background:var(--surface);
    display:grid; place-items:center;
    font-size:14px; font-weight:600; color:var(--text3);
    transition:.3s;
  }
  .photo-dot.done { border-color:var(--green); background:rgba(74,222,128,.08); color:var(--green); }
  .photo-dot.active { border-color:var(--green); animation:blink .5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  .upload-status {
    width:100%; background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:18px; text-align:center;
  }
  .upload-bar-track { height:3px; background:var(--border); border-radius:2px; margin:14px 0; }
  .upload-bar-fill  {
    height:3px; background:var(--green); border-radius:2px; width:0%;
    transition:width .4s ease;
  }
  .upload-label { font-size:11px; color:var(--text2); font-weight:500; }

</style>
</head>
<body>

<!-- FLASH -->
<div class="capture-flash" id="flash"></div>

<!-- ══ TELA 1: INÍCIO ══ -->
<div class="screen" id="screen-start">
  <div class="start-wrap">

    <div class="start-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="21" stroke="#4ade80" stroke-width="2"/>
        <circle cx="32" cy="32" r="3.5" fill="#4ade80"/>
        <line x1="32" y1="2" x2="32" y2="11" stroke="#4ade80" stroke-width="2"/>
        <line x1="32" y1="53" x2="32" y2="62" stroke="#4ade80" stroke-width="2"/>
        <line x1="2" y1="32" x2="11" y2="32" stroke="#4ade80" stroke-width="2"/>
        <line x1="53" y1="32" x2="62" y2="32" stroke="#4ade80" stroke-width="2"/>
      </svg>
      <div class="start-logo-name">VISTOR</div>
      <div class="start-logo-sub">Patrulha Inteligente</div>
    </div>

    <div class="status-line" id="statusPontos">Carregando pontos...</div>

    <button class="btn-start" onclick="iniciarPatrulha()">
      Iniciar Patrulha
    </button>
    <button class="btn-secondary" onclick="abrirConfig()">
      Configurar Pontos
    </button>

    <div class="perm-warning">
      Será solicitado acesso à câmera e localização.<br>
      Mantenha o app em primeiro plano durante a patrulha.
    </div>
  </div>
</div>

<!-- ══ TELA 2: PATRULHA ATIVA ══ -->
<div class="screen hidden" id="screen-patrol">
  <div class="camera-view">
    <video id="videoEl" autoplay muted playsinline></video>

    <div class="hud">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="crosshair"></div>

      <div class="hud-top">
        <div class="hud-rec">
          <div class="hud-rec-dot"></div>
          REC
        </div>
        <div class="hud-time" id="hudTime">--:--</div>
      </div>

      <div class="hud-gps" id="hudGPS">
        GPS: aguardando...<br>
        ACC: —
      </div>

      <div class="hud-bottom">
        <div class="next-point-card">
          <div class="np-label">Próximo ponto</div>
          <div class="np-name" id="nextName">—</div>
          <div class="np-info">
            <div class="np-dist" id="nextDist">— m</div>
            <div class="np-bar-wrap">
              <div class="np-bar-track">
                <div class="np-bar-fill" id="nextBar"></div>
              </div>
              <div class="np-eta" id="nextETA">Calculando...</div>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button class="btn-stop" onclick="pararPatrulha()">Parar</button>
          <button class="btn-manual" onclick="capturarManual()">Captura Manual</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ TELA 3: CAPTURANDO ══ -->
<div class="screen hidden" id="screen-capture">
  <div class="capture-wrap">
    <div class="capture-anim"><div class="capture-icon">📷</div></div>
    <div class="capture-title" id="captureTitle">Capturando...</div>
    <div class="capture-sub" id="captureSub">Geofence detectada</div>

    <div class="photo-counter">
      <div class="photo-dot active" id="dot1">1</div>
      <div class="photo-dot" id="dot2">2</div>
      <div class="photo-dot" id="dot3">3</div>
    </div>

    <div class="upload-status">
      <div class="upload-label" id="uploadLabel">Aguardando câmera...</div>
      <div class="upload-bar-track"><div class="upload-bar-fill" id="uploadBar"></div></div>
      <div class="upload-label" id="uploadPct">0%</div>
    </div>
  </div>
</div>


<script>
// ══════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════
let stream = null
let imageCapture = null
let wakeLock = null
let watchId = null
let posicaoAtual = null
let capturando = false
let tempoInicio = null
let hudInterval = null

// ══ CONFIGURAÇÃO ══
const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzFTTTMN1Zdny9sGBHcMLELo6OZE3o4oFPzqvKGZxAjI5LTMYrZwZkUS8ZIBSJIgXh0sg/exec'

// Pontos carregados dinamicamente do Sheets (fallback local)
let pontos = []
const jaFotografou = {}
let pontoAtualIdx = 0

// ── Carrega pontos do backend (aba "Pontos" do Sheets) ──
async function carregarPontos() {
  try {
    const resp = await fetch(BACKEND_URL + '?action=pontos')
    const json = await resp.json()
    if (json.ok && json.pontos && json.pontos.length > 0) {
      pontos = json.pontos
      document.getElementById('statusPontos').textContent = `${pontos.length} pontos carregados`
      document.getElementById('statusPontos').style.color = 'var(--text2)'
    } else {
      document.getElementById('statusPontos').textContent = json.msg || 'Adicione pontos na aba "Pontos" do Sheets'
      document.getElementById('statusPontos').style.color = 'var(--amber)'
    }
  } catch (e) {
    document.getElementById('statusPontos').textContent = 'Sem conexão — modo offline'
    document.getElementById('statusPontos').style.color = 'var(--amber)'
  }
}

// ══════════════════════════════════════════
//  NAVEGAÇÃO
// ══════════════════════════════════════════
function mostrarTela(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'))
  document.getElementById(id).classList.remove('hidden')
}

// ══════════════════════════════════════════
//  INICIAR PATRULHA
// ══════════════════════════════════════════
async function iniciarPatrulha() {
  try {
    // 1. WakeLock — tela sempre ligada
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen') } catch(e) {}
    }

    // 2. Câmera — grande angular (traseira)
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { exact: 'environment' },
        width:  { ideal: 4032 },
        height: { ideal: 3024 },
      },
      audio: false
    })

    document.getElementById('videoEl').srcObject = stream
    imageCapture = new ImageCapture(stream.getVideoTracks()[0])

    // 3. GPS contínuo
    watchId = navigator.geolocation.watchPosition(
      onPosicao,
      onGPSErro,
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
    )

    tempoInicio = Date.now()
    mostrarTela('screen-patrol')

    // Clock HUD
    hudInterval = setInterval(() => {
      const elapsed = Date.now() - tempoInicio
      const m = Math.floor(elapsed / 60000).toString().padStart(2,'0')
      const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2,'0')
      document.getElementById('hudTime').textContent = m + ':' + s
    }, 1000)

  } catch(err) {
    alert('Erro ao iniciar: ' + err.message + '\n\nVerifique as permissões de câmera e localização.')
  }
}

// ══════════════════════════════════════════
//  GPS — POSIÇÃO
// ══════════════════════════════════════════
function onPosicao(pos) {
  posicaoAtual = pos.coords
  const lat = pos.coords.latitude.toFixed(6)
  const lng = pos.coords.longitude.toFixed(6)
  const acc = Math.round(pos.coords.accuracy)

  document.getElementById('hudGPS').innerHTML =
    `GPS: ${lat}, ${lng}<br>ACC: ±${acc}m`

  // Verifica geofence em todos os pontos
  // Raio efetivo = tolera a imprecisão do GPS (accuracy), com piso de 30m e teto de 80m
  const raioEfetivo = Math.min(Math.max(30, acc), 80)
  pontos.forEach((ponto, idx) => {
    if (jaFotografou[ponto.nome]) return
    const dist = calcularDistancia(pos.coords, ponto)
    if (dist < raioEfetivo) {
      jaFotografou[ponto.nome] = true
      capturarPonto(ponto)
      setTimeout(() => { jaFotografou[ponto.nome] = false }, 60000)
    }
  })

  // Atualiza "próximo ponto"
  atualizarProximoPonto(pos.coords)
}

function onGPSErro(err) {
  document.getElementById('hudGPS').innerHTML = `GPS: ERRO<br>${err.message}`
}

// ══════════════════════════════════════════
//  PRÓXIMO PONTO
// ══════════════════════════════════════════
function atualizarProximoPonto(coords) {
  let menorDist = Infinity, proximo = null
  pontos.forEach(p => {
    if (jaFotografou[p.nome]) return
    const d = calcularDistancia(coords, p)
    if (d < menorDist) { menorDist = d; proximo = p }
  })
  if (!proximo) return

  document.getElementById('nextName').textContent = proximo.nome
  const distLabel = menorDist < 1000
    ? Math.round(menorDist) + ' m'
    : (menorDist/1000).toFixed(1) + ' km'
  document.getElementById('nextDist').textContent = distLabel

  const pct = Math.max(0, Math.min(100, 100 - (menorDist / 500 * 100)))
  document.getElementById('nextBar').style.width = pct + '%'

  const eta = Math.round(menorDist / 30) // ~30m/s dirigindo
  document.getElementById('nextETA').textContent = eta < 60
    ? `~${eta}s a 30km/h`
    : `~${Math.round(eta/60)}min a 30km/h`
}

// ══════════════════════════════════════════
//  CAPTURA AUTOMÁTICA
// ══════════════════════════════════════════
async function capturarPonto(ponto) {
  if (capturando) return
  capturando = true

  mostrarTela('screen-capture')
  document.getElementById('captureTitle').textContent = 'Capturando...'
  document.getElementById('captureSub').textContent = ponto.nome
  document.getElementById('uploadLabel').textContent = 'Preparando câmera...'
  document.getElementById('uploadBar').style.width = '0%'
  document.getElementById('uploadPct').textContent = '0%'

  resetDots()
  const fotos = []

  for (let i = 1; i <= 3; i++) {
    setDotActive(i)
    document.getElementById('uploadLabel').textContent = `Capturando foto ${i} de 3...`
    setProgress(((i-1)/3)*33)

    await esperar(400)
    flash()

    try {
      const blob = await imageCapture.takePhoto({ imageWidth:3024 })
      fotos.push(blob)
      setDotDone(i)
      setProgress((i/3)*60)
    } catch(e) {
      // fallback — câmera simulada em ambiente sem hardware
      fotos.push(null)
      setDotDone(i)
    }

    await esperar(500)
  }

  // Converte blobs para base64
  document.getElementById('uploadLabel').textContent = 'Preparando envio...'
  setProgress(65)
  const fotosBase64 = await Promise.all(
    fotos.map(blob => blob ? blobParaBase64(blob) : Promise.resolve(null))
  )

  // Envia para o backend (Apps Script → OpenAI → Sheets)
  document.getElementById('uploadLabel').textContent = 'Enviando para servidor...'
  setProgress(75)

  try {
    if (BACKEND_URL && BACKEND_URL !== 'COLE_A_URL_DO_APPS_SCRIPT_AQUI') {
      await fetch(BACKEND_URL, {
        method: 'POST',
        mode: 'no-cors', // Apps Script não exige preflight assim
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          ponto: ponto.nome,
          lat: posicaoAtual ? posicaoAtual.latitude  : ponto.lat,
          lng: posicaoAtual ? posicaoAtual.longitude : ponto.lng,
          fotos: fotosBase64.filter(Boolean)
        })
      })
      document.getElementById('uploadLabel').textContent = 'Analisando com IA...'
      setProgress(90)
      await esperar(1500)
    } else {
      // Sem backend configurado — simula para demo
      document.getElementById('uploadLabel').textContent = 'Backend não configurado (demo)'
      setProgress(90)
      await esperar(800)
    }
  } catch(e) {
    document.getElementById('uploadLabel').textContent = 'Erro de conexão — dado salvo localmente'
    setProgress(90)
    await esperar(800)
  }

  setProgress(100)
  document.getElementById('uploadPct').textContent = 'Concluído'
  document.getElementById('captureTitle').textContent = 'Registrado!'
  document.getElementById('uploadLabel').textContent = `${ponto.nome} — análise enviada`

  await esperar(2000)
  mostrarTela('screen-patrol')
  capturando = false
}

async function capturarManual() {
  // Usa posição GPS atual ou o ponto mais próximo como referência
  const pontoManual = posicaoAtual
    ? {
        nome: 'Captura Manual',
        lat: posicaoAtual.latitude,
        lng: posicaoAtual.longitude
      }
    : pontos[0]
  await capturarPonto(pontoManual)
}

// ══════════════════════════════════════════
//  PARAR PATRULHA
// ══════════════════════════════════════════
function pararPatrulha() {
  if (stream) { stream.getTracks().forEach(t => t.stop()) }
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId) }
  if (wakeLock) { wakeLock.release(); wakeLock = null }
  clearInterval(hudInterval)
  capturando = false
  mostrarTela('screen-start')
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function calcularDistancia(pos, ponto) {
  const R = 6371000
  const dLat = (ponto.lat - pos.latitude) * Math.PI / 180
  const dLng = (ponto.lng - pos.longitude) * Math.PI / 180
  const a = Math.sin(dLat/2)**2 +
            Math.cos(pos.latitude * Math.PI/180) *
            Math.cos(ponto.lat * Math.PI/180) *
            Math.sin(dLng/2)**2
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))
}

function esperar(ms) { return new Promise(r => setTimeout(r, ms)) }

function blobParaBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onloadend = () => resolve(reader.result)
    reader.onerror = reject
    reader.readAsDataURL(blob)
  })
}

function flash() {
  const el = document.getElementById('flash')
  el.classList.add('flash')
  setTimeout(() => el.classList.remove('flash'), 150)
}

function setProgress(pct) {
  document.getElementById('uploadBar').style.width = pct + '%'
  document.getElementById('uploadPct').textContent = Math.round(pct) + '%'
